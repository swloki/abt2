syntax = "proto3";
package abt.v1;

import "abt/v1/base.proto";
import "abt/v1/excel.proto";

option go_package = "abt/v1";

service AbtBomService {
  rpc ListBoms(ListBomsRequest) returns (BomListResponse);
  rpc GetBom(GetBomRequest) returns (BomResponse);
  rpc CreateBom(CreateBomRequest) returns (U64Response);
  rpc UpdateBom(UpdateBomRequest) returns (BoolResponse);
  rpc DeleteBom(DeleteBomRequest) returns (BoolResponse);
  rpc SaveAsBom(SaveAsBomRequest) returns (U64Response);
  rpc ExportBom(ExportBomRequest) returns (BoolResponse);
  rpc GetLeafNodes(GetLeafNodesRequest) returns (BomNodesResponse);
  rpc AddBomNode(AddBomNodeRequest) returns (U64Response);
  rpc UpdateBomNode(UpdateBomNodeRequest) returns (BoolResponse);
  rpc DeleteBomNode(DeleteBomNodeRequest) returns (U64Response);
  rpc SwapBomNode(SwapBomNodeRequest) returns (BoolResponse);
  rpc ExistsBomName(ExistsBomNameRequest) returns (BoolResponse);
  rpc ListLaborProcesses(ListLaborProcessesRequest) returns (BomLaborProcessListResponse);
  rpc CreateLaborProcess(CreateLaborProcessRequest) returns (U64Response);
  rpc UpdateLaborProcess(UpdateLaborProcessRequest) returns (BoolResponse);
  rpc DeleteLaborProcess(DeleteLaborProcessRequest) returns (U64Response);
  rpc ImportLaborProcesses(ImportLaborProcessRequest) returns (ImportLaborProcessResponse);
  rpc GetProductCode(GetProductCodeRequest) returns (StringResponse);
  // 流式下载 BOM 导出文件
  rpc DownloadBom(DownloadBomRequest) returns (stream DownloadFileResponse);
}

message BomNodeProto {
  int64 node_id = 1;
  int64 product_id = 2;
  string product_code = 3;
  double quantity = 4;
  int64 parent_id = 5;
  double loss_rate = 6;
  int32 sort_order = 7;
  string unit = 8;
  string remark = 9;
  string position = 10;
  string work_center = 11;
  string properties = 12;
}

message BomDetailProto {
  repeated BomNodeProto nodes = 1;
  string created_by = 2;
}

message BomResponse {
  int64 bom_id = 1;
  string name = 2;
  string created_by = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
  BomDetailProto bom_detail = 6;
}

message BomListResponse {
  repeated BomResponse items = 1;
  uint64 total = 2;
}

message BomNodeResponse {
  int64 node_id = 1;
  int64 bom_id = 2;
  int64 parent_id = 3;
  int64 product_id = 4;
  string product_name = 5;
  double quantity = 6;
  int32 sort_order = 7;
  string product_code = 8;
  double loss_rate = 9;
  string unit = 10;
  string remark = 11;
  string position = 12;
  string work_center = 13;
  string properties = 14;
}

message BomNodesResponse {
  repeated BomNodeResponse items = 1;
}

message ListBomsRequest {
  optional uint32 page = 1;
  optional uint32 page_size = 2;
  optional string keyword = 3;
  optional string product_code = 4;
  optional string date_from = 5;
  optional string date_to = 6;
}

message GetBomRequest {
  int64 bom_id = 1;
}

message CreateBomRequest {
  string name = 1;
  string created_by = 2;
}

message UpdateBomRequest {
  int64 bom_id = 1;
  string name = 2;
}

message DeleteBomRequest {
  int64 bom_id = 1;
}

message SaveAsBomRequest {
  int64 source_bom_id = 1;
  string new_name = 2;
  string created_by = 3;
}

message ExportBomRequest {
  int64 bom_id = 1;
  string file_path = 2;
}

message GetLeafNodesRequest {
  int64 bom_id = 1;
}

message AddBomNodeRequest {
  int64 bom_id = 1;
  int64 parent_id = 2;
  int64 product_id = 3;
  double quantity = 4;
  double loss_rate = 5;
  string unit = 6;
  string remark = 7;
  string position = 8;
  string work_center = 9;
  string properties = 10;
}

message UpdateBomNodeRequest {
  int64 bom_id = 1;
  int64 node_id = 2;
  double quantity = 3;
  double loss_rate = 4;
  string unit = 5;
  string remark = 6;
  string position = 7;
  string work_center = 8;
  string properties = 9;
}

message DeleteBomNodeRequest {
  int64 bom_id = 1;
  int64 node_id = 2;
}

message SwapBomNodeRequest {
  int64 bom_id = 1;
  int64 node_id_1 = 2;
  int64 node_id_2 = 3;
}

message ExistsBomNameRequest {
  string name = 1;
}

message GetProductCodeRequest {
  int64 bom_id = 1;
}

// 人工工序
message BomLaborProcessProto {
  int64 id = 1;
  string product_code = 2; // 产品编码，用于关联 BOM
  string name = 3;
  string unit_price = 4;
  string quantity = 5;
  int32 sort_order = 6;
  string remark = 7;
}

message BomLaborProcessListResponse {
  repeated BomLaborProcessProto items = 1;
  uint64 total = 2;
}

message CreateLaborProcessRequest {
  string product_code = 1; // 使用产品编码关联
  string name = 2;
  string unit_price = 3;
  string quantity = 4;
  int32 sort_order = 5;
  string remark = 6;
}

message UpdateLaborProcessRequest {
  int64 id = 1;
  string product_code = 2; // 使用产品编码关联
  string name = 3;
  string unit_price = 4;
  string quantity = 5;
  int32 sort_order = 6;
  string remark = 7;
}

message DeleteLaborProcessRequest {
  int64 id = 1;
  string product_code = 2; // 使用产品编码关联
}

message ListLaborProcessesRequest {
  string product_code = 1; // 按产品编码查询
  optional uint32 page = 2;
  optional uint32 page_size = 3;
}

message ImportLaborProcessRequest {
  string file_path = 1; // Excel 文件路径（包含产品编码列）
}

message ImportLaborProcessResponse {
  uint64 success_count = 1;
  uint64 fail_count = 2;
  repeated string errors = 3;
}

// 流式下载 BOM 请求
message DownloadBomRequest {
  int64 bom_id = 1;
}
