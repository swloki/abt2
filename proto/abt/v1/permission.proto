syntax = "proto3";
package abt.v1;

option go_package = "abt/v1";

import "abt/v1/base.proto";

// 权限资源枚举
enum Resource {
  PRODUCT = 0;
  TERM = 1;
  BOM = 2;
  WAREHOUSE = 3;
  LOCATION = 4;
  INVENTORY = 5;
  PRICE = 6;
  LABOR_PROCESS = 7;
  USER = 8;
  ROLE = 9;
  PERMISSION = 10;
  DEPARTMENT = 11;
  EXCEL = 12;
  LABOR_PROCESS_DICT = 13;
  ROUTING = 14;
}

// 权限操作枚举
enum Action {
  READ = 0;
  WRITE = 1;
  DELETE = 2;
}

service PermissionService {
    rpc GetUserPermissions(GetUserPermissionsRequest) returns (UserPermissionsResponse);
    rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
    rpc ListResources(Empty) returns (ResourceListResponse);
    rpc ListUserResources(ListUserResourcesRequest) returns (ResourceListResponse);
    rpc ListPermissions(Empty) returns (PermissionListResponse);
    rpc ListAuditLogs(ListAuditLogsRequest) returns (AuditLogListResponse);
}

message GetUserPermissionsRequest {
    int64 user_id = 1;
}

message UserPermissionsResponse {
    repeated PermissionInfo permissions = 1;
}

message CheckPermissionRequest {
    int64 user_id = 1;
    string resource_code = 2;
    string action_code = 3;
}

message CheckPermissionResponse {
    bool has_permission = 1;
}

message ResourceListResponse {
    repeated ResourceGroup groups = 1;
}

message ListUserResourcesRequest {
    int64 user_id = 1;
}

message ResourceGroup {
    string group_name = 1;
    repeated ResourceInfo resources = 2;
}

message PermissionListResponse {
    repeated PermissionGroup groups = 1;
}

message PermissionGroup {
    string group_name = 1;
    repeated PermissionInfo permissions = 2;
}

message ListAuditLogsRequest {
    int64 limit = 1;
    int64 offset = 2;
}

message AuditLogListResponse {
    repeated AuditLogInfo logs = 1;
}

message AuditLogInfo {
    int64 log_id = 1;
    int64 operator_id = 2;
    string operator_name = 3;
    string target_type = 4;
    int64 target_id = 5;
    string action = 6;
    int64 created_at = 7;
}

message PermissionInfo {
    int64 permission_id = 1;
    string permission_name = 2;
    ResourceInfo resource = 3;
    string action_code = 4;
    string action_name = 5;
}

message ResourceInfo {
    int64 resource_id = 1;
    string resource_name = 2;
    string resource_code = 3;
    string group_name = 4;
}
