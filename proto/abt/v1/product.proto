syntax = "proto3";
package abt.v1;

option go_package = "abt/v1";

import "abt/v1/base.proto";

service AbtProductService {
  rpc ListProducts(ListProductsRequest) returns (ProductListResponse);
  rpc GetProduct(GetProductRequest) returns (ProductResponse);
  rpc GetProductsByIds(GetProductsByIdsRequest) returns (ProductsResponse);
  rpc CreateProduct(CreateProductRequest) returns (U64Response);
  rpc UpdateProduct(UpdateProductRequest) returns (BoolResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (BoolResponse);
  rpc CheckProductUsage(CheckProductUsageRequest) returns (CheckProductUsageResponse);
  rpc WatchProduct(WatchProductRequest) returns (WatchProductResponse);
  rpc UnwatchProduct(UnwatchProductRequest) returns (BoolResponse);
  rpc ListWatchedProducts(ListWatchedProductsRequest) returns (ListWatchedProductsResponse);
}

message ProductMeta {
  reserved 1, 2, 3, 5, 7;
  reserved "category", "subcategory", "product_code", "unit", "loss_rate";
  string specification = 4;
  string acquire_channel = 6;
  optional string old_code = 8;
}

message ProductResponse {
  int64 product_id = 1;
  string pdt_name = 2;
  ProductMeta meta = 3;
  string product_code = 4;
  string unit = 5;
  optional int64 term_id = 6;
}

message ProductsResponse {
  repeated ProductResponse items = 1;
}

message ProductListResponse {
  repeated ProductResponse items = 1;
  uint64 total = 2;
  uint32 page = 3;
  uint32 page_size = 4;
}

message ListProductsRequest {
  optional uint32 page = 1;
  optional uint32 page_size = 2;
  optional string keyword = 3;
  optional int64 term_id = 4;
  optional string product_code = 5;
}

message GetProductRequest {
  int64 product_id = 1;
}

message GetProductsByIdsRequest {
  repeated int64 product_ids = 1;
}

message CreateProductRequest {
  string pdt_name = 1;
  ProductMeta meta = 2;
  string product_code = 3;
  string unit = 4;
  optional int64 term_id = 5;
}

message UpdateProductRequest {
  int64 product_id = 1;
  string pdt_name = 2;
  ProductMeta meta = 3;
  string product_code = 4;
  string unit = 5;
  optional int64 term_id = 6;
}

message DeleteProductRequest {
  int64 product_id = 1;
}

// BOM 简要引用信息
message BomReference {
  int64 bom_id = 1;
  string bom_name = 2;
}

message CheckProductUsageRequest {
  int64 product_id = 1;
  optional uint32 page = 2;
  optional uint32 page_size = 3;
}

message CheckProductUsageResponse {
  bool is_used = 1;
  repeated BomReference used_in_boms = 2;
  int64 total_boms = 3;  // 总共使用的 BOM 数量（可能多于返回的列表）
}

// 关注产品
message WatchProductRequest {
  int64 product_id = 1;
  optional string safety_stock_override = 2;  // Decimal → string
}

message WatchProductResponse {
  bool is_new = 1;
}

message UnwatchProductRequest {
  int64 product_id = 1;
}

message ListWatchedProductsRequest {
  optional uint32 page = 1;
  optional uint32 page_size = 2;
}

message WatchedProduct {
  int64 product_id = 1;
  string product_code = 2;
  string product_name = 3;
  string current_quantity = 4;               // Decimal → string
  string effective_safety_stock = 5;         // COALESCE(override, safety_stock)
  bool is_alerting = 6;                      // current_quantity < effective_safety_stock
}

message ListWatchedProductsResponse {
  repeated WatchedProduct items = 1;
  uint64 total = 2;
  uint32 page = 3;
  uint32 page_size = 4;
}
