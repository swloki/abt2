syntax = "proto3";
package abt.v1;

option go_package = "abt/v1";

import "abt/v1/base.proto";
import "abt/v1/permission.proto";

service RoleService {
    rpc CreateRole(CreateRoleRequest) returns (RoleResponse);
    rpc UpdateRole(UpdateRoleRequest) returns (RoleResponse);
    rpc DeleteRole(DeleteRoleRequest) returns (Empty);
    rpc GetRole(GetRoleRequest) returns (RoleResponse);
    rpc ListRoles(Empty) returns (RoleListResponse);
    rpc AssignPermissions(AssignPermissionsRequest) returns (Empty);
    rpc RemovePermissions(RemovePermissionsRequest) returns (Empty);
}

message CreateRoleRequest {
    string role_name = 1;
    string role_code = 2;
    string description = 3;
}

message UpdateRoleRequest {
    int64 role_id = 1;
    string role_name = 2;
    string description = 3;
}

message DeleteRoleRequest {
    int64 role_id = 1;
}

message GetRoleRequest {
    int64 role_id = 1;
}

message RoleResponse {
    int64 role_id = 1;
    string role_name = 2;
    string role_code = 3;
    bool is_system_role = 4;
    string description = 5;
    repeated PermissionInfo permissions = 6;
}

message RoleListResponse {
    repeated RoleListItem roles = 1;
}

message RoleListItem {
    int64 role_id = 1;
    string role_name = 2;
    string role_code = 3;
    bool is_system_role = 4;
    string description = 5;
}

message AssignPermissionsRequest {
    int64 role_id = 1;
    repeated int64 permission_ids = 2;
}

message RemovePermissionsRequest {
    int64 role_id = 1;
    repeated int64 permission_ids = 2;
}
